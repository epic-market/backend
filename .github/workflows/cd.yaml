name: CD - Deploy to AWS EC2

on:
  workflow_call:
    inputs:
      is_api:
        description: 'True to deploy API and False to deploy MVC'
        required: true
        type: boolean
        default: true

concurrency:
  group: 'cd-${{ inputs.is_api }}'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Determine which application to deploy
        id: determine-application
        run: |
          is_api=${{ inputs.is_api }}
          if [ "$is_api" = "true" ]; then
            echo "::set-output name=application::api"
          else
            echo "::set-output name=application::mvc"
          fi

      - name: Remove existing Docker containers and images
        run: /home/ubuntu/remove_containers.sh ghcr.io/${{ github.repository }}-${{ steps.determine-application.outputs.application }}

      - name: Login to Docker Hub
        run: sudo docker login -u ${{ github.actor }} -p ${{ secrets.CONTAINER_REGISTRY_TOKEN }} ghcr.io

      - name: Pull Docker image
        run: sudo docker pull ghcr.io/${{ github.repository }}-${{ steps.determine-application.outputs.application }}:latest

      - name: Determine port based on application
        id: determine-port
        run: |
          is_api=${{ inputs.is_api }}
          if [ "$is_api" = "true" ]; then
            echo "::set-output name=port::3003"
          else
            echo "::set-output name=port::3001"
          fi

      - name: Run Docker container
        run: |
          is_api=${{ inputs.is_api }}
          db_conn="Server=tcp:${{ secrets.DB_HOSTNAME }};Database=${{ secrets.DB_NAME }};User Id=${{ secrets.DB_USERNAME }};Password=${{ secrets.DB_PASSWORD }};Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;"
          if [ "$is_api" = "true" ]; then
            sudo docker run /
              -e ConnectionStrings:DefaultConnection=$db_conn /
              -d /
              -p ${{ steps.determine-port.outputs.port }}:8080 /
              ghcr.io/${{ github.repository }}-${{ steps.determine-application.outputs.application }}
          else 
            sudo docker run /
              -e ConnectionStrings:DefaultConnection=$db_conn /
              -e ConnectionStrings:AuthDbContextConnection=$db_conn /
              -d /
              -p ${{ steps.determine-port.outputs.port }}:8080 /
              ghcr.io/${{ github.repository }}-${{ steps.determine-application.outputs.application }}
          fi