name: CI - Docker build and push

on:
  workflow_dispatch:
    inputs:
      is_api:
        description: 'True to deploy API and False to deploy MVC'
        required: true
        type: boolean
        default: true

concurrency:
  group: 'ci-${{ inputs.is_api }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine which application to deploy
        id: determine-application
        run: |
          if [${{ inputs.is_api }}]
          then
            echo "::set-output name=application::api"
          else
            echo "::set-output name=application::mvc"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ steps.determine-application.outputs.application }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ steps.determine-application.outputs.application }}:latest

  call-cd:
    needs: build
    uses: ./.github/workflows/cd.yaml
    secrets: inherit
    with:
      is_api: ${{ inputs.is_api }}
